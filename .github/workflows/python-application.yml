name: Python Application CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas automatizadas
        run: pytest

      - name: Ejecutar la aplicación
        run: python app.py

      - name: Simular fase de despliegue
        run: echo "Despliegue simulado correctamente"

      - name: Iniciar sesión en GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Construir imagen Docker
        run: docker build -t ghcr.io/${{ github.repository_owner }}/ejercicio:3.0.0 .

      - name: Publicar imagen Docker
        run: docker push ghcr.io/${{ github.repository_owner }}/ejercicio:3.0.0